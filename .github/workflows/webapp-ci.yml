name: Web App CI (Debug)

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Vibe-Code

    steps:
      - uses: actions/checkout@v4

      - name: Show folder structure
        run: ls -R

      - name: Node version
        run: node -v

      - name: Install dependencies (verbose)
        run: npm ci --verbose

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Check Playwright version
        run: npx playwright --version

      - name: Run tests (forced output)
        run: npx playwright test --reporter=line --debug
